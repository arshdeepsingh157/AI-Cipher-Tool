kind = "web"
previewPath = "/"
title = "Encryption & Decryption with AI"
version = "1.0.0"
id = "artifacts/crypto-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22907

[services.development]
run = "pnpm --filter @workspace/crypto-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-ai", "run", "build" ]
publicDir = "artifacts/crypto-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22907"
BASE_PATH = "/"
